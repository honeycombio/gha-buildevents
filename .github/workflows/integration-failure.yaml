name: Integration Failure

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  integration:
    name: Expected Failure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Buildevents
        uses: ./
        with:
          apikey: ${{ secrets.BUILDEVENTS_APIKEY }}
          dataset: gha-buildevents_integration
          status: ${{ job.status }}

      - run: |
          echo "STEP_ID=Expected Failure" >> $GITHUB_ENV
          echo "STEP_START=$(date +%s)" >> $GITHUB_ENV
      - name: Sleepy Time
        run: buildevents cmd $TRACE_ID "$STEP_ID" sleep -- sleep 1
      - name: Expected Failure
        run: ./.github/scripts/test-be-failure
      - name: Send parent span for job
        if: always()
        run: |
          printf "\njob.status=${{ job.status }}" >> $BUILDEVENT_FILE
          buildevents step $TRACE_ID "$STEP_ID" $STEP_START "$STEP_ID"
