name: Integration

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 * * * *" # run once every hour

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set trace-start
        id: set-trace-start
        run: |
          echo "trace-start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Buildevents
        uses: ./
        with:
          apikey: ${{ secrets.BUILDEVENTS_APIKEY }}
          dataset: gha-buildevents_integration

      - name: Print contents of BUILDEVENT_FILE
        run: |
          echo Contents of BUILDEVENT_FILE:
          cat $BUILDEVENT_FILE

      - run: |
          STEP_ID=smoke-test
          echo "STEP_ID=${STEP_ID}" >> $GITHUB_ENV
          echo "STEP_START=$(date +%s)" >> $GITHUB_ENV
      - run: |
          buildevents cmd $TRACE_ID $STEP_ID sleep -- sleep 5
      - run: |
          buildevents cmd $TRACE_ID $STEP_ID 'sleep some more' -- sleep 2
      - run: |
          buildevents step $TRACE_ID $STEP_ID $STEP_START $STEP_ID
    outputs:
      trace-start: ${{ steps.set-trace-start.outputs.trace-start }}

  smoke-test-windows:
    name: Smoke test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Buildevents
        uses: ./
        with:
          apikey: ${{ secrets.BUILDEVENTS_APIKEY }}
          dataset: gha-buildevents_integration

      - name: Print contents of BUILDEVENT_FILE
        shell: pwsh
        run: |
          echo "Contents of BUILDEVENT_FILE:"
          Get-Content $env:BUILDEVENT_FILE

      - shell: pwsh
        run: |
          $env:STEP_ID = "smoke-test-windows"
          echo "STEP_ID=$($env:STEP_ID)" >> $env:GITHUB_ENV
          echo "STEP_START=$([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())" >> $env:GITHUB_ENV
      - shell: pwsh
        run: |
          buildevents cmd $env:TRACE_ID $env:STEP_ID sleep --shell powershell.exe -- "Start-Sleep -Seconds 5"
      - shell: pwsh
        run: |
          buildevents cmd $env:TRACE_ID $env:STEP_ID 'sleep some more' --shell powershell.exe -- "Start-Sleep -Seconds 2"
      - shell: pwsh
        run: |
          buildevents step $env:TRACE_ID $env:STEP_ID $env:STEP_START $env:STEP_ID

  matrix:
    name: Matrix
    runs-on: ubuntu-latest
    needs: [smoke-test]

    strategy:
      fail-fast: false
      matrix:
        value: [valueA, valueB]

    steps:
      - uses: actions/checkout@v6

      - name: Buildevents
        uses: ./
        with:
          apikey: ${{ secrets.BUILDEVENTS_APIKEY }}
          dataset: gha-buildevents_integration
          matrix-key: ${{ matrix.value }}

      - run: |
          STEP_ID=matrix-${{ matrix.value }}
          echo "STEP_ID=${STEP_ID}" >> $GITHUB_ENV
          echo "STEP_START=$(date +%s)" >> $GITHUB_ENV
      - run: |
          buildevents cmd $TRACE_ID $STEP_ID ${{ matrix.value }} -- echo The matrix value is ${{ matrix.value }}
      - run: |
          buildevents cmd $TRACE_ID $STEP_ID sleep -- sleep 2
      - run: |
          buildevents step $TRACE_ID $STEP_ID $STEP_START $STEP_ID

  end-trace:
    name: End Trace
    runs-on: ubuntu-latest
    needs: [smoke-test, matrix]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v6
      - uses: technote-space/workflow-conclusion-action@v3
      - name: Buildevents
        uses: ./
        with:
          # Required: a Honeycomb API key - needed to send traces.
          #           this must be set in your GitHub repository under Settings > Secrets > Actions
          apikey: ${{ secrets.BUILDEVENTS_APIKEY }}
          # Required: the Honeycomb dataset to send traces to.
          dataset: gha-buildevents_integration
          # Required: the job status, this will be used in the post section and sent
          #           as status of the trace. Must always be ${{ job.status }}.
          status: ${{ env.WORKFLOW_CONCLUSION }}
          trace-start: ${{ needs.smoke-test.outputs.trace-start}}
